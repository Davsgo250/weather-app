<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>
    </head>
    <body>
        <header>
            <h1>Weather App</h1>
        </header>
        <main>
            <div class="searchSection">
                <input
                    type="search"
                    name="searchCity"
                    id="searchCity"
                    placeholder="Search for a location (e.g., London, GB)"
                />
                <button id="searchWeather">Search</button>
            </div>
            <div class="mainCard">
                <h2 class="city">London</h2>
                <div class="mainDayInfo">
                    <div class="imageMainInfo">
                        <img src="./images/weather-icons/sun-cloud.png" alt="iconWeatherMain" />
                    </div>
                    <div class="tempInfo">
                        <p id="temp">19°C</p>
                        <p id="conditions">Mostly Cloudy</p>
                    </div>
                    <div class="tempMoreInfo">
                        <p id="humidity">Humidity: 65%</p>
                        <p id="wind">Wind: 14 km/h SW</p>
                        <p id="presipitation">Precipitation: 10%</p>
                    </div>
                </div>
            </div>
            <div class="daysCards">
                <div class="card">
                    <p class="day">Mon</p>
                    <img src="./images/weather-icons/sun-cloud.png" alt="" class="cardImage" />
                    <p class="temp">21°/12°</p>
                </div>
                <div class="card">
                    <p class="day">Tue</p>
                    <img src="./images/weather-icons/sun-cloud.png" alt="" class="cardImage" />
                    <p class="temp">21°/12°</p>
                </div>
                <div class="card">
                    <p class="day">Wed</p>
                    <img src="./images/weather-icons/sun-cloud.png" alt="" class="cardImage" />
                    <p class="temp">24°/12°</p>
                </div>
                <div class="card">
                    <p class="day">Thu</p>
                    <img src="./images/weather-icons/sun-cloud.png" alt="" class="cardImage" />
                    <p class="temp">26°/12°</p>
                </div>
                <div class="card">
                    <p class="day">Fri</p>
                    <img src="./images/weather-icons/sun-cloud.png" alt="" class="cardImage" />
                    <p class="temp">23°/12°</p>
                </div>
            </div>
        </main>
        <footer>
            <p>@Davsgo250</p>
            <a href="https://github.com/Davsgo250">Github</a>
        </footer>
    </body>
</html>
